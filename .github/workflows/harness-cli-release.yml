name: Harness CLI Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing or new GitHub Release tag to upload artifacts to"
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: "Existing or new GitHub Release tag to upload artifacts to"
        required: true
        type: string
      checkout_ref:
        description: "Git ref to build. Defaults to the workflow ref."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # 2026-07-10
        with:
          toolchain: stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Check architecture boundaries
        run: scripts/validate-architecture.sh

      - name: Validate release pin
        run: scripts/validate-harness-cli-release.sh

      - name: Run tests
        run: cargo test --workspace

      - name: Check shell scripts
        run: |
          bash -n scripts/install-harness.sh
          bash -n scripts/build-harness-cli-release.sh

  build:
    name: Build ${{ matrix.platform }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            target: aarch64-apple-darwin
            runner: macos-15
            binary: harness-cli-macos-arm64
          - platform: macos-x64
            target: x86_64-apple-darwin
            runner: macos-15-intel
            binary: harness-cli-macos-x64
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            binary: harness-cli-linux-x64
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            binary: harness-cli-linux-arm64
          - platform: windows-x64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: harness-cli-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # 2026-07-10
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build release artifact
        shell: bash
        run: scripts/build-harness-cli-release.sh --target "${{ matrix.target }}"

      - name: Validate release artifact
        shell: bash
        run: scripts/validate-harness-cli-release.sh --artifact-dir dist

      - name: Smoke built CLI
        shell: bash
        run: |
          "dist/${{ matrix.binary }}" --help
          "dist/${{ matrix.binary }}" score-trace --help

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: harness-cli-${{ matrix.platform }}
          path: |
            dist/${{ matrix.binary }}
            dist/${{ matrix.binary }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_tag != '' }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: harness-cli-*
          merge-multiple: true
          path: dist

      - name: Create release if needed
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "Harness CLI release $RELEASE_TAG"

      - name: Upload release assets
        run: gh release upload "$RELEASE_TAG" dist/harness-cli-* --repo "$GITHUB_REPOSITORY" --clobber
