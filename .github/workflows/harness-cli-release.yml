name: Harness CLI Release

on:
  push:
    tags:
      - "harness-cli-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing or new GitHub Release tag to upload artifacts to"
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: "Existing or new GitHub Release tag to upload artifacts to"
        required: true
        type: string
      checkout_ref:
        description: "Git ref to build. Defaults to the workflow ref."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}
          fetch-depth: 0

      - name: Verify release tag, source, and crate identity
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_tag != '' }}
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: scripts/verify-harness-cli-release-identity.sh "$RELEASE_TAG"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq ripgrep sqlite3

      - name: Run repository contract
        run: scripts/validate-premerge.sh

  build:
    name: Build ${{ matrix.platform }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            target: aarch64-apple-darwin
            runner: macos-15
            binary: harness-cli-macos-arm64
          - platform: macos-x64
            target: x86_64-apple-darwin
            runner: macos-15-intel
            binary: harness-cli-macos-x64
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            binary: harness-cli-linux-x64
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            binary: harness-cli-linux-arm64
          - platform: windows-x64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: harness-cli-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}
          fetch-depth: 0

      - name: Verify release tag, source, and crate identity
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_tag != '' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: scripts/verify-harness-cli-release-identity.sh "$RELEASE_TAG"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release artifact
        shell: bash
        run: scripts/build-harness-cli-release.sh --target "${{ matrix.target }}"

      - name: Verify candidate checksum
        shell: bash
        run: |
          cd dist
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 -c "${{ matrix.binary }}.sha256"
          else
            sha256sum -c "${{ matrix.binary }}.sha256"
          fi

      - name: Smoke built CLI
        if: ${{ matrix.platform != 'windows-x64' }}
        shell: bash
        run: tests/protocol/smoke-native-artifact.sh "dist/${{ matrix.binary }}"

      - name: Smoke built CLI on Windows
        if: ${{ matrix.platform == 'windows-x64' }}
        shell: pwsh
        run: tests/protocol/smoke-native-artifact.ps1 -Artifact "dist/${{ matrix.binary }}"

      - name: Download initial protocol artifact
        shell: bash
        run: |
          curl -fsSL \
            "https://github.com/hoangnb24/repository-harness/releases/download/harness-cli-v0.1.14/${{ matrix.binary }}" \
            -o "dist/us092-${{ matrix.binary }}"
          curl -fsSL \
            "https://github.com/hoangnb24/repository-harness/releases/download/harness-cli-v0.1.14/${{ matrix.binary }}.sha256" \
            -o "dist/us092-${{ matrix.binary }}.sha256"
          expected="$(awk '{print $1}' "dist/us092-${{ matrix.binary }}.sha256")"
          if command -v shasum >/dev/null 2>&1; then
            actual="$(shasum -a 256 "dist/us092-${{ matrix.binary }}" | awk '{print $1}')"
          else
            actual="$(sha256sum "dist/us092-${{ matrix.binary }}" | awk '{print $1}')"
          fi
          [[ "$actual" == "$expected" ]]
          if [[ "${{ matrix.platform }}" != windows-x64 ]]; then
            chmod 755 "dist/us092-${{ matrix.binary }}"
          fi

      - name: Upgrade initial protocol binary to candidate
        if: ${{ matrix.platform != 'windows-x64' }}
        shell: bash
        run: |
          candidate_ref="${{ inputs.release_tag || github.ref_name }}"
          if [[ ! "$candidate_ref" =~ ^harness-cli-v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)*$ ]]; then
            candidate_ref=harness-cli-v0.0.0-candidate
          fi
          tests/installer/test-cli-upgrade-candidate.sh \
            "dist/us092-${{ matrix.binary }}" \
            "dist/${{ matrix.binary }}" \
            "${{ matrix.binary }}" \
            "$candidate_ref"

      - name: Smoke PowerShell installer modes and candidate upgrade
        if: ${{ matrix.platform == 'windows-x64' }}
        shell: pwsh
        run: |
          $candidateRef = "${{ inputs.release_tag || github.ref_name }}"
          if ($candidateRef -notmatch '^harness-cli-v[0-9]+\.[0-9]+\.[0-9]+(?:[.-][A-Za-z0-9]+)*$') {
            $candidateRef = "harness-cli-v0.0.0-candidate"
          }
          tests/protocol/smoke-native-artifact.ps1 `
            -Artifact "dist/us092-${{ matrix.binary }}"
          tests/installer/test-install-harness-modes.ps1 `
            -CandidateArtifact "dist/${{ matrix.binary }}" `
            -InitialArtifact "dist/us092-${{ matrix.binary }}" `
            -CandidateRef $candidateRef

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness-cli-${{ matrix.platform }}
          path: |
            dist/${{ matrix.binary }}
            dist/${{ matrix.binary }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_tag != '' }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: harness-cli-*
          merge-multiple: true
          path: dist

      - name: Create release if needed
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "Harness CLI release $RELEASE_TAG"

      - name: Upload release assets
        run: gh release upload "$RELEASE_TAG" dist/harness-cli-* --repo "$GITHUB_REPOSITORY" --clobber
