name: Harness Kit Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing or new Harness kit release tag"
        required: true
        type: string
      checkout_ref:
        description: "Git ref to package; defaults to the release tag"
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: "Existing or new Harness kit release tag"
        required: true
        type: string
      checkout_ref:
        description: "Git ref to package; defaults to the release tag"
        required: false
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: false

permissions:
  contents: write

jobs:
  verify:
    name: Verify kit inputs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.checkout_ref || github.event.inputs.checkout_ref || github.ref }}

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # 2026-07-10
        with:
          toolchain: stable

      - name: Verify source checks
        run: |
          cargo fmt --check
          cargo test --workspace
          cargo build -p harness-cli
          bash -n scripts/install-harness.sh scripts/harness scripts/build-harness-macos-kit.sh scripts/render-homebrew-formula.sh scripts/validate-harness-macos-kit.sh
          scripts/validate-install-payload.sh

  build:
    name: Build ${{ matrix.platform }} kit
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-15
            cli_asset: harness-cli-macos-arm64
          - platform: macos-x64
            runner: macos-15-intel
            cli_asset: harness-cli-macos-x64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.checkout_ref || github.event.inputs.checkout_ref || github.ref }}

      - name: Resolve bundled CLI release
        id: cli
        run: echo "tag=$(awk 'NF && $1 !~ /^#/ { print $1; exit }' scripts/harness-cli-release-tag)" >> "$GITHUB_OUTPUT"

      - name: Download bundled CLI release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ steps.cli.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --pattern "${{ matrix.cli_asset }}" --dir dist

      - name: Build and verify kit archive
        env:
          HARNESS_CLI_FIXTURE: ${{ github.workspace }}/dist/${{ matrix.cli_asset }}
        run: |
          scripts/build-harness-macos-kit.sh --platform "${{ matrix.platform }}" --cli "$HARNESS_CLI_FIXTURE" --out-dir dist
          scripts/validate-harness-macos-kit.sh
          shasum -a 256 "dist/harness-macos-${{ matrix.platform == 'macos-arm64' && 'arm64' || 'x64' }}.tar.gz" > "dist/harness-macos-${{ matrix.platform == 'macos-arm64' && 'arm64' || 'x64' }}.tar.gz.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: harness-kit-${{ matrix.platform }}
          path: |
            dist/harness-macos-arm64.tar.gz
            dist/harness-macos-arm64.tar.gz.sha256
            dist/harness-macos-x64.tar.gz
            dist/harness-macos-x64.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish kit release
    needs: build
    runs-on: macos-15
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_tag != '' }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag || github.event.inputs.release_tag || github.ref_name }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.checkout_ref || github.event.inputs.checkout_ref || github.ref }}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: harness-kit-*
          merge-multiple: true
          path: dist

      - name: Create release and upload kit assets
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes "Harness macOS kit release $RELEASE_TAG"
          gh release upload "$RELEASE_TAG" dist/harness-macos-*.tar.gz dist/harness-macos-*.tar.gz.sha256 --repo "$GITHUB_REPOSITORY" --clobber

      - name: Update Homebrew tap when configured
        run: |
          set -euo pipefail
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; update Formula/harness.rb manually."
            exit 0
          fi
          if ! git ls-remote "https://github.com/winterzxzz/homebrew-tap.git" HEAD >/dev/null 2>&1; then
            echo "winterzxzz/homebrew-tap is unavailable; create the tap then render Formula/harness.rb manually."
            exit 0
          fi
          kit_version="${RELEASE_TAG#harness-kit-v}"
          arm_sha="$(awk '{ print $1; exit }' dist/harness-macos-arm64.tar.gz.sha256)"
          intel_sha="$(awk '{ print $1; exit }' dist/harness-macos-x64.tar.gz.sha256)"
          tap_dir="$(brew --repository)/Library/Taps/winterzxzz/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/winterzxzz/homebrew-tap.git" "$tap_dir"
          scripts/render-homebrew-formula.sh --kit-version "$kit_version" --arm-sha "$arm_sha" --intel-sha "$intel_sha" --output "$tap_dir/Formula/harness.rb"
          HOMEBREW_NO_AUTO_UPDATE=1 brew install winterzxzz/tap/harness
          test "$(harness --version)" = "$kit_version"
          smoke_target="$(mktemp -d)"
          harness init --dry-run --yes "$smoke_target"
          rm -rf "$smoke_target"
          HOMEBREW_NO_AUTO_UPDATE=1 brew uninstall harness
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/harness.rb
          git diff --cached --quiet || git commit -m "chore: update harness to $kit_version"
          git push origin HEAD:main
